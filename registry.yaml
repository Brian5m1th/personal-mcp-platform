registry_version: '1.0'
updated: '2026-07-12'
servers:
- id: context7
  name: Context7
  version: 3.2.3
  category: documentation
  description: Live documentation for frameworks and libraries. Eliminates outdated
    examples and reduces hallucinations.
  maintainer:
    name: Context7 Inc.
    url: https://context7.com
    github: context7/mcp-server
  license: MIT
  maturity: stable
  protocol:
    default: stdio
    transports:
    - type: stdio
      command: npx
      args:
      - -y
      - '@context7/mcp-server'
      env: {}
  permissions:
    filesystem: none
    network: https-outbound
    shell: false
    secrets: []
    risks:
    - level: low
      description: Network egress to context7.com for documentation fetching
  requirements:
    node: '>=18'
    npm: true
  agents:
  - claude-code
  - opencode
  - antigravity
  - cursor
  - vscode
  platforms:
  - linux
  - macos
  - windows
  - wsl
  tags:
  - docs
  - api
  - frameworks
  - hallucination-reduction
  install:
    method: npx
    command: npx @context7/mcp-server
    auto_update: true
    update_policy: minor
  health:
    check_method: tools/list
    expected_startup_ms: 8000
    expected_latency_ms: 500
    expected_ram_mb: 100
  benchmark:
    startup_ms: 800
    ram_mb: 45
    latency_ms: 120
    stability: 0.99
