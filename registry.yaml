- id: github
  name: GitHub MCP
  version: 2025.4.8
  category: source-control
  description: 'GitHub integration: Issues, Pull Requests, Commits, Branches, Reviews,
    Repository search, Actions.'
  maintainer:
    name: GitHub / ModelContextProtocol
    url: https://github.com/modelcontextprotocol/server-github
    github: modelcontextprotocol/server-github
  license: MIT
  maturity: stable
  protocol:
    default: stdio
    transports:
    - type: stdio
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-github'
      env:
        GITHUB_TOKEN: ${secrets.github.token}
  permissions:
    filesystem: none
    network: https-outbound
    shell: false
    secrets:
    - GITHUB_TOKEN
    risks:
    - level: medium
      description: GitHub API access. Token with write scope can modify repos.
  requirements:
    node: '>=18'
    npm: true
    secrets:
      GITHUB_TOKEN:
        description: GitHub personal access token with repo scope
        required: true
        source: environment
  agents:
  - claude-code
  - opencode
  - antigravity
  - cursor
  - vscode
  platforms:
  - linux
  - macos
  - windows
  - wsl
  tags:
  - github
  - git
  - pr
  - issues
  - code-review
  install:
    method: npx
    command: npx @modelcontextprotocol/server-github
    auto_update: true
    update_policy: minor
  health:
    check_method: tools/list
    expected_startup_ms: 5000
    expected_latency_ms: 1000
    expected_ram_mb: 80
  benchmark:
    startup_ms: 2000
    ram_mb: 50
    latency_ms: 800
    stability: 0.98
