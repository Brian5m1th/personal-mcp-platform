- id: filesystem
  name: Filesystem MCP
  version: 2026.7.10
  category: filesystem
  description: Safe file read/write/search within workspace boundaries.
  maintainer:
    name: ModelContextProtocol
    url: https://github.com/modelcontextprotocol/server-filesystem
    github: modelcontextprotocol/server-filesystem
  license: MIT
  maturity: stable
  protocol:
    default: stdio
    transports:
    - type: stdio
      command: npx
      args:
      - -y
      - '@modelcontextprotocol/server-filesystem'
      - '{{workspace}}'
      env: {}
  permissions:
    filesystem: read-write-with-boundaries
    network: none
    shell: false
    secrets: []
    risks:
    - level: high
      description: Read/write access within workspace boundaries. Misconfiguration
        could expose sensitive files.
    - level: low
      description: Path traversal if boundaries are not correctly enforced.
  requirements:
    node: '>=18'
    npm: true
    workspace_bound: true
  agents:
  - claude-code
  - opencode
  - antigravity
  - cursor
  - vscode
  platforms:
  - linux
  - macos
  - windows
  - wsl
  tags:
  - filesystem
  - files
  - read
  - write
  - search
  install:
    method: npx
    command: npx @modelcontextprotocol/server-filesystem <workspace>
    auto_update: false
    update_policy: manual
  health:
    check_method: tools/list
    expected_startup_ms: 3000
    expected_latency_ms: 100
    expected_ram_mb: 50
  benchmark:
    startup_ms: 1000
    ram_mb: 30
    latency_ms: 50
    stability: 0.99
