# ── Context7: Live Documentation ─────────────────────────────────
- id: context7
  name: "Context7"
  version: "3.2.3"
  category: documentation
  description: >
    Live documentation for frameworks and libraries.
    Eliminates outdated examples and reduces hallucinations.
    Supports React, Spring Boot, Tauri, LangGraph, OpenAI,
    Docker, n8n, Qdrant, and hundreds more.
  maintainer:
    name: "Upstash"
    url: "https://context7.com"
    github: "upstash/context7-mcp"
  license: "MIT"
  maturity: stable
  protocol:
    default: stdio
    transports:
      - type: stdio
        command: "npx"
        args: ["-y", "@upstash/context7-mcp"]
        env: {}
  permissions:
    filesystem: none
    network: https-outbound
    shell: false
    secrets: []
    risks:
      - level: low
        description: "Network egress to context7.com for documentation fetching"
  requirements:
    node: ">=18"
    npm: true
  agents:
    - claude-code
    - opencode
    - antigravity
    - cursor
    - vscode
  platforms:
    - linux
    - macos
    - windows
    - wsl
  tags:
    - docs
    - api
    - frameworks
    - hallucination-reduction
    - live-docs
  install:
    method: npx
    command: "npx @upstash/context7-mcp"
    auto_update: true
    update_policy: minor
  health:
    check_method: tools/list
    expected_startup_ms: 8000
    expected_latency_ms: 500
    expected_ram_mb: 100
  benchmark:
    startup_ms: 800
    ram_mb: 45
    latency_ms: 120
    stability: 0.99

