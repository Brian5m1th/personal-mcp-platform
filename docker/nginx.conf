server {
    listen 80;
    server_name localhost;

    # ── Health endpoint ─────────────────────────────────────────
    location /health {
        return 200 "{\"status\":\"healthy\",\"platform\":\"mcp-platform\",\"version\":\"0.1.0\"}";
        add_header Content-Type application/json;
    }

    # ── MCP Context7 ────────────────────────────────────────────
    location /mcp/context7/ {
        proxy_pass http://context7:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── MCP GitHub ──────────────────────────────────────────────
    location /mcp/github/ {
        proxy_pass http://github:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── MCP Filesystem ──────────────────────────────────────────
    location /mcp/filesystem/ {
        proxy_pass http://filesystem:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── MCP Sequential Thinking ─────────────────────────────────
    location /mcp/sequential-thinking/ {
        proxy_pass http://sequential-thinking:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── MCP PostgreSQL ──────────────────────────────────────────
    location /mcp/postgres/ {
        proxy_pass http://postgres:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── MCP Docker ──────────────────────────────────────────────
    location /mcp/docker/ {
        proxy_pass http://docker:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── SSE support ─────────────────────────────────────────────
    location /sse/ {
        proxy_pass http://$http_host$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
