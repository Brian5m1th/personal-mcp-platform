# MCP Platform — Docker Compose Stack
# Containerized MCP servers for the Personal AI Engineering Platform
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml down

services:
  # ── Context7: Live Documentation ──────────────────────────────
  context7:
    image: node:20-slim
    container_name: mcp-context7
    profiles: ["full", "documentation", "ai-llm"]
    command: >
      sh -c "npx -y @context7/mcp-server"
    environment:
      - NODE_ENV=production
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "context7"
      mcp.category: "documentation"
      mcp.tier: "1"

  # ── Serena: Code Understanding ────────────────────────────────
  serena:
    image: ghcr.io/serena-ai/serena-mcp:latest
    container_name: mcp-serena
    profiles: ["full", "ai-llm"]
    volumes:
      - ../..:/workspace:ro
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "serena"
      mcp.category: "code-understanding"
      mcp.tier: "1"

  # ── GitHub: Source Control ────────────────────────────────────
  github:
    image: node:20-slim
    container_name: mcp-github
    profiles: ["full", "backend", "frontend", "devops", "ai-llm"]
    command: >
      sh -c "npx -y @modelcontextprotocol/server-github"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "github"
      mcp.category: "source-control"
      mcp.tier: "1"

  # ── Playwright: Browser Automation ────────────────────────────
  playwright:
    image: node:20-slim
    container_name: mcp-playwright
    profiles: ["full", "frontend"]
    command: >
      sh -c "npx -y @playwright/mcp"
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "playwright"
      mcp.category: "browser-automation"
      mcp.tier: "1"

  # ── Filesystem: Safe File Access ──────────────────────────────
  filesystem:
    image: node:20-slim
    container_name: mcp-filesystem
    profiles: ["full", "backend", "frontend", "devops", "ai-llm", "minimal"]
    command: >
      sh -c "npx -y @modelcontextprotocol/server-filesystem /workspace"
    volumes:
      - ../..:/workspace:ro
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "filesystem"
      mcp.category: "filesystem"
      mcp.tier: "1"

  # ── Sequential Thinking: Reasoning ────────────────────────────
  sequential-thinking:
    image: node:20-slim
    container_name: mcp-sequential-thinking
    profiles: ["full", "backend", "frontend", "devops", "ai-llm", "minimal"]
    command: >
      sh -c "npx -y @modelcontextprotocol/server-sequential-thinking"
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "sequential-thinking"
      mcp.category: "reasoning"
      mcp.tier: "1"

  # ── PostgreSQL: Database ──────────────────────────────────────
  postgres:
    image: node:20-slim
    container_name: mcp-postgres
    profiles: ["full", "backend"]
    command: >
      sh -c "npx -y @modelcontextprotocol/server-postgres"
    environment:
      - DATABASE_URL=${MCP_POSTGRES_DSN:-postgresql://localhost:5432/postgres}
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "postgres"
      mcp.category: "database"
      mcp.tier: "2"

  # ── Docker: Container Management ─────────────────────────────
  docker:
    image: node:20-slim
    container_name: mcp-docker
    profiles: ["full", "backend", "devops"]
    command: >
      sh -c "npx -y @modelcontextprotocol/server-docker"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "docker"
      mcp.category: "container"
      mcp.tier: "2"

  # ── Fetch: Web Research ───────────────────────────────────────
  fetch:
    image: node:20-slim
    container_name: mcp-fetch
    profiles: ["full", "backend", "frontend", "ai-llm", "devops"]
    command: >
      sh -c "npx -y @modelcontextprotocol/server-fetch"
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "fetch"
      mcp.category: "web-research"
      mcp.tier: "2"

  # ── Memory: Persistent Memory ─────────────────────────────────
  memory:
    image: node:20-slim
    container_name: mcp-memory
    profiles: ["full", "backend", "frontend", "ai-llm"]
    command: >
      sh -c "npx -y @modelcontextprotocol/server-memory"
    volumes:
      - mcp-memory-data:/home/node/.mcp-memory
    networks:
      - mcp-net
    restart: unless-stopped
    labels:
      mcp.server: "memory"
      mcp.category: "memory"
      mcp.tier: "2"

  # ── MCP Proxy (HTTP/SSE Gateway) ──────────────────────────────
  mcp-proxy:
    image: nginx:alpine
    container_name: mcp-proxy
    profiles: ["full"]
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mcp-net
    depends_on:
      - context7
      - github
      - filesystem
      - sequential-thinking
    restart: unless-stopped
    labels:
      mcp.server: "proxy"
      mcp.category: "infrastructure"

networks:
  mcp-net:
    name: mcp-platform-net
    driver: bridge

volumes:
  mcp-memory-data:
